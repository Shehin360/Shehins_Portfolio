<section id="projects" class="projects-section section-padding">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">&lt;/Projects&gt;</h2>
      <div class="section-line"></div>
    </div>
    <div class="projects-grid">
      @for (project of projects(); track project.name) {
        <div class="project-card glass-panel">
          <div class="project-content">
            <h3 class="project-name">{{ project.name }}</h3>
            <p class="project-desc">{{ project.description }}</p>
            <a [href]="project.github" target="_blank" rel="noopener noreferrer" class="github-link">
              Github Link &rarr;
            </a>
          </div>
          <div class="project-tags">
            @for (tag of project.tags; track tag) {
              <span class="glass-tag">{{ tag }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
